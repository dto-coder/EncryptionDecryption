<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSA Web</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
   
</head>
<body>
    <p>This is a regular text in HTML.</p>

    <div id="container">
        <div id="message-input">
            <label for="message">Enter message to encrypt:</label>
            <input type="text" id="message" name="message">
            <button onclick="display()">Display Message</button>
        </div>
        <br>
        <div id="display-message"></div>
        <br>
        <div id="display"></div>
        <div id="display-encrypted"></div>
        <br>
        <div id="genKeys">
            <button onclick="generateRSAKeys()">Generate RSA Keys</button>
        </div>
    </div>
</body>
</html>
