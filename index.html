<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSA Web</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
   
</head>
<body>
    <p>This is a regular text in HTML.</p><br>

    <div id="container">
        <p>"message-input"</p>
        <div id="message-input">
            <label for="message">Enter message to encrypt:</label>
            <input type="text" id="message" name="message">
            <button onclick="display()">Display Message</button>
            <button onclick="clearDisplay()">Clear</button>
        </div><br>
        
        <p>"display-message"</p>
        <div id="display-message"></div>

        <p>"display"</p>
        <div id="display"></div>

        <p>"display-encrypted"</p>
        <div id="display-encrypted"></div>

        <p>"display-decrypted"</p>
        <div id="display-decrypted"></div>

        <p>"genKeys"</p>
        <div id="genKeys">
            <button onclick="generateRSAKeys()">Generate RSA Keys</button>
        </div>
    </div>
</body>
</html>
